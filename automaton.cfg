# =========================
# automaton.cfg
# =========================

# =========================
# simulation
# =========================
# Scenario selection (0-7, or -1 for splash screen selection)
#   0 = Wavefront propagation
#   1 = Relocation test
#   2 = Orphan test
#   3 = Contraction test
#   4 = Hunting test
#   5 = Reissue test
#   6 = Dispersion test
#   7 = Full convolution
simulation.scenario = 2

# =========================
# data3D (visualization layers)
# =========================
data3D.wavefront = true
data3D.momentum  = false
data3D.spin      = false
data3D.sine_mask = false
data3D.hunting   = false
data3D.centers   = false
data3D.lattice   = false
data3D.axes      = true
data3D.plane     = false

# =========================
# delays (pause between phases)
# =========================
delay.convol  = false
delay.diffuse = false
delay.reloc   = false

# =========================
# view
# =========================
view.zoom   = 45.0
view.vis_dx = 0
view.vis_dy = 0
view.vis_dz = 0

# =========================
# projection
# =========================
projection.fov         = 45.0
projection.near        = 0.1
projection.far         = 1000.0
projection.perspective = true